name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest --cov=kre --cov-report=term-missing

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kre
          POSTGRES_PASSWORD: kre
          POSTGRES_DB: kre
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kre -d kre"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      KRE_TEST_POSTGRES_DSN: postgresql://kre:kre@localhost:5432/kre
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,postgres]"
      - run: pytest tests/integration -v
