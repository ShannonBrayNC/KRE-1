name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --quiet --upgrade pip
      - run: pip install --quiet -e ".[dev]"
      - run: ruff check .
      - name: Capture pytest output
        run: |
          set +e
          pytest --cov=kre --cov-report=term-missing > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          exit $status
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
